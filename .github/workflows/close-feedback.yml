name: Close feedback on commit

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: feedback-closure
  cancel-in-progress: false

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Determine commit range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          if [[ "$before" == "0000000000000000000000000000000000000000" || -z "$before" ]]; then
            before="$(git rev-list --max-parents=0 "$after" | tail -n1)"
          fi
          echo "before=$before" >> "$GITHUB_OUTPUT"
          echo "after=$after" >> "$GITHUB_OUTPUT"

      - name: Write feedback token
        env:
          FEEDBACK_TOKEN_CLEANCENTIVE_ORG: ${{ secrets.FEEDBACK_TOKEN_CLEANCENTIVE_ORG }}
        shell: bash
        run: |
          if [[ -z "${FEEDBACK_TOKEN_CLEANCENTIVE_ORG:-}" ]]; then
            echo "secret FEEDBACK_TOKEN_CLEANCENTIVE_ORG is not set; prod updates will be skipped"
            exit 0
          fi
          mkdir -p infrastructure
          printf '%s' "$FEEDBACK_TOKEN_CLEANCENTIVE_ORG" > infrastructure/.feedback-token.cleancentive.org

      - name: Process commits
        shell: bash
        run: |
          set -euo pipefail
          shas="$(git rev-list --no-merges --reverse ${{ steps.range.outputs.before }}..${{ steps.range.outputs.after }})"
          if [[ -z "$shas" ]]; then
            echo "No commits in range"
            exit 0
          fi
          # shellcheck disable=SC2086
          bun scripts/close-feedback.ts $shas

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          rm -f infrastructure/.feedback-token.cleancentive.org
          if [[ -z "$(git status --porcelain docs/feedback-plans)" ]]; then
            echo "No feedback-plan changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/feedback-plans
          git commit -m "chore(feedback): mark resolved tickets [skip ci]"
          git push
