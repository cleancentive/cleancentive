services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: cleancentive-db
    environment:
      POSTGRES_DB: cleancentive
      POSTGRES_USER: cleancentive
      POSTGRES_PASSWORD: cleancentive_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-umami-db.sql:/docker-entrypoint-initdb.d/10-create-umami-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleancentive"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cleancentive-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cleancentive-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: cleancentive-mailpit
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP server
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres-browser:
    image: sosedoff/pgweb:0.16.2
    container_name: cleancentive-postgres-browser
    environment:
      PGWEB_DATABASE_URL: postgres://cleancentive:cleancentive_dev_password@postgres:5432/cleancentive?sslmode=disable
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: cleancentive-umami
    environment:
      DATABASE_URL: postgresql://cleancentive:cleancentive_dev_password@postgres:5432/umami
      APP_SECRET: dev-secret-change-in-prod
      DISABLE_TELEMETRY: 1
      DISABLE_UPDATES: 1
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
