services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      outline:
        condition: service_healthy
      umami:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  frontend:
    image: ghcr.io/cleancentive/cleancentive-frontend:27e9ae25796161f2af84ac083416e53f2c2a6a93
    restart: unless-stopped
    environment:
      UMAMI_SCRIPT_URL: https://analytics.${DOMAIN}/script.js
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      UMAMI_SHARE_URL: ${UMAMI_SHARE_URL:-}
      WIKI_URL: https://wiki.${DOMAIN}
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    image: ghcr.io/cleancentive/cleancentive-backend:3c16b185af455790d14298e2ea77469271e99764
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    environment:
      OUTLINE_PUBLIC_URL: https://wiki.${DOMAIN}
      OUTLINE_TEAM_LOGO_URL: https://${DOMAIN}/icon.svg
      UMAMI_URL: http://umami:3000
      UMAMI_PUBLIC_URL: https://analytics.${DOMAIN}
      UMAMI_WIKI_DOMAIN: wiki.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "await fetch('http://127.0.0.1:3000/api/openapi.json').then((response) => { if (!response.ok) process.exit(1); });"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    image: ghcr.io/cleancentive/cleancentive-worker:8dc991fa40abf9e6862f7115897f0b894773f79d
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME:-cleancentive}
      POSTGRES_DB: ${DB_DATABASE:-cleancentive}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cleancentive} -d ${DB_DATABASE:-cleancentive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  outline-db-init:
    image: postgis/postgis:15-3.4
    restart: "no"
    command: >
      sh -c "psql -h postgres -U $${DB_USERNAME:-cleancentive} -tc
      \"SELECT 1 FROM pg_database WHERE datname = 'outline'\" | grep -q 1
      || psql -h postgres -U $${DB_USERNAME:-cleancentive} -c 'CREATE DATABASE outline;'"
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  outline:
    image: docker.getoutline.com/outlinewiki/outline@sha256:3afb97340dd792c72dabdb0ab78deaf24a895b21d7abdc62ef9dd353ae861a13
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    environment:
      PORT: 3000
      URL: https://wiki.${DOMAIN}
      DATABASE_URL: postgresql://${DB_USERNAME:-cleancentive}:${DB_PASSWORD}@postgres:5432/outline
      PGSSLMODE: disable
      REDIS_URL: redis://redis:6379
      REDIS_COLLABORATION_URL: redis://redis:6379
      SECRET_KEY: ${OUTLINE_SECRET_KEY}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET}
      FILE_STORAGE: s3
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_REGION: ${S3_REGION}
      AWS_S3_UPLOAD_BUCKET_URL: ${S3_ENDPOINT}
      AWS_S3_UPLOAD_BUCKET_NAME: ${OUTLINE_S3_BUCKET}
      AWS_S3_FORCE_PATH_STYLE: "true"
      OIDC_CLIENT_ID: outline
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_ISSUER_URL: https://${DOMAIN}/api/v1/oidc
      OIDC_SCOPES: openid profile email offline_access
      OIDC_DISABLE_REDIRECT: "true"
      FORCE_HTTPS: "true"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_FROM_EMAIL: ${SMTP_FROM:-no-reply@cleancentive.org}
    depends_on:
      outline-db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/_health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  umami-db-init:
    image: postgis/postgis:15-3.4
    restart: "no"
    command: >
      sh -c "psql -h postgres -U $${DB_USERNAME:-cleancentive} -tc
      \"SELECT 1 FROM pg_database WHERE datname = 'umami'\" | grep -q 1
      || psql -h postgres -U $${DB_USERNAME:-cleancentive} -c 'CREATE DATABASE umami;'"
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-cleancentive}:${DB_PASSWORD}@postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: 1
      DISABLE_UPDATES: 1
    depends_on:
      umami-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
