services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      umami:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  frontend:
    image: ghcr.io/cleancentive/cleancentive-frontend:bf3094dd07a03479980e149eebb33fb5b8f24b49
    restart: unless-stopped
    environment:
      UMAMI_SCRIPT_URL: https://analytics.${DOMAIN}/script.js
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      UMAMI_SHARE_URL: ${UMAMI_SHARE_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    image: ghcr.io/cleancentive/cleancentive-backend:17e3bb9a4d555bea2f1b9be3a010ee001d749a10
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "await fetch('http://127.0.0.1:3000/api/v1/docs').then((response) => { if (!response.ok) process.exit(1); });"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    image: ghcr.io/cleancentive/cleancentive-worker:bf3094dd07a03479980e149eebb33fb5b8f24b49
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME:-cleancentive}
      POSTGRES_DB: ${DB_DATABASE:-cleancentive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cleancentive} -d ${DB_DATABASE:-cleancentive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  umami-db-init:
    image: postgis/postgis:15-3.4
    restart: "no"
    command: >
      sh -c "psql -h postgres -U $${DB_USERNAME:-cleancentive} -tc
      \"SELECT 1 FROM pg_database WHERE datname = 'umami'\" | grep -q 1
      || psql -h postgres -U $${DB_USERNAME:-cleancentive} -c 'CREATE DATABASE umami;'"
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-cleancentive}:${DB_PASSWORD}@postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: 1
      DISABLE_UPDATES: 1
    depends_on:
      umami-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
