services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  frontend:
    image: ghcr.io/cleancentive/cleancentive-frontend:eb63a241dceb06c92c791fcdc88f9aae31c11f48
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    image: ghcr.io/cleancentive/cleancentive-backend:532509b5c0aebf4e55e5cdbdde30a6b4852002ab
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "await fetch('http://127.0.0.1:3000/api/v1/docs').then((response) => { if (!response.ok) process.exit(1); });"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    image: ghcr.io/cleancentive/cleancentive-worker:e25f26a067fbbddfdad285f33f33409134619441
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    env_file:
      - ${PRIVATE_ENV_FILE:-../private/.env}
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME:-cleancentive}
      POSTGRES_DB: ${DB_DATABASE:-cleancentive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cleancentive} -d ${DB_DATABASE:-cleancentive}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
